dataset:
  root_path: data/public/input

agent:
  model: YOUR_MODEL_NAME
  api_base: YOUR_API_BASE_URL
  api_key: YOUR_API_KEY
  max_steps: 16
  temperature: 0.0

run:
  output_dir: artifacts/runs
  run_id: example_run_id
  max_workers: 4
  task_timeout_seconds: 900

# v0 specific
executor:
  flat_max_steps: 8        # Easy/Medium 单循环上限
  step_timeout_seconds: 60 # 单次代码块执行超时

planner:
  enable_for: [hard, extreme]   # 仅这两档启用 Plan-Executor
  max_plan_steps: 5
  max_consecutive_failures: 3   # 连续 N 步同错触发 replan
  max_replan_count: 5           # replan 次数上限，超过强制 submit best-effort

preload:
  max_csv_size_mb: 500          # 单 CSV 上限，超过仅 schema 不入 ns
  inject_knowledge_md: true     # 是否把 knowledge.md / doc/*.md 全文注入 prompt
