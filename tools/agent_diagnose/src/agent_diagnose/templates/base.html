<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Agent Diagnose{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='prism.min.css') }}">
    <script src="{{ url_for('static', path='htmx.min.js') }}" defer></script>
    <script src="{{ url_for('static', path='prism.min.js') }}" defer></script>
    <script src="{{ url_for('static', path='prism-python.min.js') }}" defer></script>
    <script src="{{ url_for('static', path='prism-json.min.js') }}" defer></script>
</head>
<body>
    <div class="topbar">
        <span class="brand">🔬 Agent Diagnose</span>
        <nav class="nav">
            <a href="/overview" class="{% if active_page == 'overview' %}active{% endif %}">Overview</a>
            <a href="/eval" class="{% if active_page == 'eval' %}active{% endif %}">Eval</a>
            {% if active_task_id %}
            <a href="/task/{{ active_task_id }}{% if active_run_id %}?run={{ active_run_id }}{% endif %}"
               class="{% if active_page == 'task' %}active{% endif %}">Task {{ active_task_id }}</a>
            {% endif %}
        </nav>
        <span class="text-dim text-mono">{{ runs|length }} run(s)</span>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
      // Re-highlight Prism on HTMX swaps so dynamically-injected code blocks get coloured.
      document.body.addEventListener('htmx:afterSwap', () => {
        if (window.Prism) Prism.highlightAll();
      });
      // Copy button
      document.body.addEventListener('click', (ev) => {
        const btn = ev.target.closest('.copy-btn');
        if (!btn) return;
        const sel = btn.dataset.copyTarget;
        const node = sel ? document.querySelector(sel) : null;
        if (!node) return;
        navigator.clipboard.writeText(node.innerText).then(() => {
          const original = btn.textContent;
          btn.textContent = 'Copied';
          setTimeout(() => { btn.textContent = original; }, 1200);
        });
      });
    </script>
</body>
</html>
