<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Agent Diagnose{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="{{ url_for('static', path='htmx.min.js') }}" defer></script>
</head>
<body>
    <div class="topbar">
        <span class="brand">🔬 Agent Diagnose</span>
        <nav class="nav">
            <a href="/overview" class="{% if active_page == 'overview' %}active{% endif %}">Overview</a>
            <a href="/eval" class="{% if active_page == 'eval' %}active{% endif %}">Eval</a>
            {% if active_task_id %}
            <a href="/task/{{ active_task_id }}{% if active_run_id %}?run={{ active_run_id }}{% endif %}"
               class="{% if active_page == 'task' %}active{% endif %}">Task {{ active_task_id }}</a>
            {% endif %}
        </nav>
        <span class="text-dim text-mono">{{ runs|length }} run(s)</span>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
